name: turbovec-release

# Prebuild @memwarden/turbovec for every supported platform and publish ONE
# npm package containing all binaries (the package.json files field includes
# *.node; memwarden's loader picks the right one via napi's index.js).
#
# Trigger: push a tag like turbovec-v0.1.0, or run manually. Publishing needs
# either npm Trusted Publishing configured for @memwarden/turbovec (preferred:
# repo Settings on npmjs.com -> Trusted Publisher -> this repo + this workflow
# file) or an NPM_TOKEN secret with publish rights to the @memwarden scope.

on:
  push:
    tags: ["turbovec-v*"]
  workflow_dispatch: {}

defaults:
  run:
    working-directory: native/turbovec-node

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS links the system Accelerate framework (always present), so it
          # builds natively on the runner. Linux x64 builds inside the old-glibc
          # node:20-bullseye container (glibc 2.31, broad compatibility) and
          # STATICALLY links an OpenBLAS compiled from source (no runtime BLAS,
          # no fortran runtime dependency).
          #
          # Linux ARM64 is intentionally NOT a native prebuild: OpenBLAS's
          # Neoverse kernels fail to compile under bullseye's gcc, and forcing a
          # newer compiler would raise the glibc floor. arm64 Linux users get
          # the honest TypeScript fallback (memwarden status names the real
          # backend) until a clean arm64 build path lands. Tracked as a follow-up.
          - host: macos-14
            target: aarch64-apple-darwin
          # macos-13 (the last free Intel image) was retired in Dec 2025;
          # macos-15-intel is GitHub's designated replacement.
          - host: macos-15-intel
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            buildImage: node:20-bullseye
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/turbovec-node
      # Linux: build in the old-glibc napi-rs container so the .node runs on a
      # broad range of distros (bullseye glibc, well below node:20-slim's).
      # openblas-src compiles OpenBLAS in-container, statically linked, so the
      # binary references only the container's (old) glibc and no runtime BLAS.
      - name: build binding (linux — portable old-glibc container)
        if: contains(matrix.target, 'linux')
        working-directory: .
        run: |
          docker run --rm -v "$PWD":/w -w /w/native/turbovec-node ${{ matrix.buildImage }} \
            bash -lc '
              set -e
              # node:20-bullseye has node + build tools + curl; add gfortran for
              # the openblas-src static compile and a current Rust via rustup
              # (bullseye repos ship no rustc). Old glibc (2.31) stays, so the
              # binary loads broadly; the toolchain version is independent of it.
              apt-get update && apt-get install -y --no-install-recommends gfortran make gcc g++ perl
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
              . "$HOME/.cargo/env"
              npm ci
              npx napi build --release --platform --target ${{ matrix.target }}
            '
      # macOS: build natively (Accelerate is in the OS).
      - name: build binding (macos)
        if: ${{ !contains(matrix.target, 'linux') }}
        run: |
          npm ci
          npx napi build --release --platform --target ${{ matrix.target }}
      # Per-platform gate: the freshly built binding must pass memwarden's
      # real native integration tests on THIS platform before it ships.
      - name: test the binding on this platform
        working-directory: .
        run: |
          npm ci
          npx vitest run test/turbovec-native.test.ts
      # The PROMOTION BENCHMARK the docs advertise: recall drop <= 2 points
      # vs FP32, in-kernel allowlist correctness, add/remove/save/load id-set
      # parity. This is what makes the "auto" default honest — a published
      # binary is a binary that passed this gate on its platform.
      - name: promotion benchmark gate
        working-directory: .
        run: npm run benchmark:backends
      # CLEAN-CONSUMER gate: the binding must dlopen in a bare node:20-slim
      # image — no OpenBLAS, no build tools, and a stock glibc — or it must
      # not ship. This catches both a dynamic libopenblas dependency and a
      # too-new glibc requirement before either reaches a user.
      - name: clean-container load test (linux)
        if: contains(matrix.target, 'linux')
        run: |
          docker run --rm -v "$PWD":/pkg -w /pkg node:20-slim \
            node -e "const b = require('./index.js'); const k = Object.keys(b); if (k.length === 0) throw new Error('no exports'); console.log('clean-container load OK:', k.join(','));"
      - uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: native/turbovec-node/*.node
          if-no-files-found: error

  # NOTE: auto-publish removed. This workflow BUILDS + VALIDATES the native
  # binding for every platform (build, native tests, promotion benchmark, and
  # the clean-container load gate) and uploads each platform's *.node as an
  # artifact. Publishing is done manually — download the artifacts from a green
  # run and `npm publish` locally (an interactive OTP works; CI cannot provide
  # one). See docs/RELEASE-turbovec.md. Once the package exists on npm,
  # configure Trusted Publishing (OIDC) and this can auto-publish token-free.
