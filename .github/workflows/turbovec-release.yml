name: turbovec-release

# Prebuild @memwarden/turbovec for every supported platform and publish ONE
# npm package containing all binaries (the package.json files field includes
# *.node; memwarden's loader picks the right one via napi's index.js).
#
# Trigger: push a tag like turbovec-v0.1.0, or run manually. Publishing needs
# either npm Trusted Publishing configured for @memwarden/turbovec (preferred:
# repo Settings on npmjs.com -> Trusted Publisher -> this repo + this workflow
# file) or an NPM_TOKEN secret with publish rights to the @memwarden scope.

on:
  push:
    tags: ["turbovec-v*"]
  workflow_dispatch: {}

defaults:
  run:
    working-directory: native/turbovec-node

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS links the system Accelerate framework (always present).
          # Linux STATICALLY links OpenBLAS built from source by openblas-src,
          # so the runners need a Fortran toolchain, not the runtime -dev pkg,
          # and the shipped .node has no external BLAS dependency. Built
          # natively per-arch — GitHub's arm64 runner avoids cross-compiling.
          - host: macos-14
            target: aarch64-apple-darwin
          # macos-13 (the last free Intel image) was retired in Dec 2025;
          # macos-15-intel is GitHub's designated replacement.
          - host: macos-15-intel
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            setup: sudo apt-get update && sudo apt-get install -y gfortran make gcc perl
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            setup: sudo apt-get update && sudo apt-get install -y gfortran make gcc perl
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/turbovec-node
      - name: platform deps
        if: matrix.setup
        run: ${{ matrix.setup }}
      - run: npm ci
      - run: npx napi build --release --platform --target ${{ matrix.target }}
      # Per-platform gate: the freshly built binding must pass memwarden's
      # real native integration tests on THIS platform before it ships.
      - name: test the binding on this platform
        working-directory: .
        run: |
          npm ci
          npx vitest run test/turbovec-native.test.ts
      # The PROMOTION BENCHMARK the docs advertise: recall drop <= 2 points
      # vs FP32, in-kernel allowlist correctness, add/remove/save/load id-set
      # parity. This is what makes the "auto" default honest — a published
      # binary is a binary that passed this gate on its platform.
      - name: promotion benchmark gate
        working-directory: .
        run: npm run benchmark:backends
      # CLEAN-CONSUMER gate: the runner installed OpenBLAS to build, but a
      # user's machine has not. The binding must dlopen in a bare node image
      # (no OpenBLAS, no build tools) or it must not ship — a published
      # binary that only loads on machines with libopenblas would quietly
      # fall back to TypeScript for almost every Linux user.
      - name: clean-container load test (linux)
        if: contains(matrix.target, 'linux')
        run: |
          docker run --rm -v "$PWD":/pkg -w /pkg node:20-slim \
            node -e "const b = require('./index.js'); const k = Object.keys(b); if (k.length === 0) throw new Error('no exports'); console.log('clean-container load OK:', k.join(','));"
      - uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: native/turbovec-node/*.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    # id-token for npm provenance; contents read for checkout.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      # npm trusted publishing (OIDC) requires Node >=22.14 / npm >=11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
        working-directory: .
      - uses: actions/download-artifact@v4
        with:
          pattern: binding-*
          merge-multiple: true
          path: native/turbovec-node
      - run: ls -la *.node && npm ci
      - name: smoke the binding on this runner
        run: node -e "const b = require('./index.js'); console.log('loaded:', Object.keys(b));"
      - name: publish (dry run on manual dispatch, real on tag)
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npm publish --provenance --access public
          else
            npm publish --dry-run --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
