name: release

# Publish memwarden to npm with provenance when a v* tag is pushed. The full
# test suite and a fresh-tarball install must pass first — a release that
# skipped the gates is not a release.
#
# Setup (one time): configure npm Trusted Publishing for `memwarden`
# (npmjs.com -> package Settings -> Trusted Publisher -> this repo + this
# workflow file), or add an NPM_TOKEN secret. Trusted publishing is preferred:
# no long-lived token, and consumers get source-linked provenance.

on:
  push:
    tags: ["v*"]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      # The trust gates. A release that passes unit tests but breaks the
      # firewall would ship a broken CENTRAL promise — so the eval corpus
      # (8 gates at 100%) and the end-to-end demo (real daemon, byte-scan
      # proven erasure, exits non-zero on any broken stage) both block it.
      - run: npm run build
      - name: firewall eval gate
        run: npm run eval
      - name: firewall demo end to end
        run: npm run demo:firewall
      - name: fresh tarball must work
        run: |
          npm pack
          mkdir /tmp/fresh && cd /tmp/fresh && npm init -y
          npm install "$GITHUB_WORKSPACE"/memwarden-*.tgz --no-fund --no-audit
          ./node_modules/.bin/memwarden status
      - name: tag must match package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          test "$PKG" = "$TAG" || { echo "tag v$TAG != package.json $PKG"; exit 1; }

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      # npm trusted publishing (OIDC) requires Node >=22.14 / npm >=11.5.1.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
